<svg
  width="200"
  height="120"
  viewBox="0 0 200 120"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- Background -->
  <rect x="0" y="0" width="200" height="120" rx="16" fill="#0F172A" />

  <!-- Shadow cards -->
  <rect x="26" y="22" width="80" height="96" rx="10" fill="#020617" opacity="0.35" />
  <rect x="44" y="14" width="80" height="96" rx="10" fill="#020617" opacity="0.55" />

  <!-- Main card -->
  <rect x="62" y="8" width="80" height="96" rx="10" fill="#F9FAFB" />

  <!-- Card border -->
  <rect
    x="62"
    y="8"
    width="80"
    height="96"
    rx="10"
    fill="none"
    stroke="#E5E7EB"
    stroke-width="2"
  />

  <!-- Flag stripe (UK-style hint, abstract) -->
  <rect x="62" y="8" width="80" height="18" fill="#1D4ED8" />
  <rect x="62" y="8" width="26" height="18" fill="#DC2626" />

  <!-- Big letter on card -->
  <text
    x="102"
    y="66"
    text-anchor="middle"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="40"
    fill="#111827"
    font-weight="700"
  >
    En
  </text>

  <!-- Small label under card -->
  <text
    x="102"
    y="92"
    text-anchor="middle"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="10"
    fill="#6B7280"
    letter-spacing="1"
    style="text-transform: uppercase;"
  >
    English Cards
  </text>
</svg>
